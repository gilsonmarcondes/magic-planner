<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Magic Planner ✈️</title>
    
    <meta name="theme-color" content="#fffef0">
    <link rel="apple-touch-icon" href="icon-192.png">

    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Amatic+SC:wght@700&display=swap" rel="stylesheet">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <script async src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAtp5jarrnwyy3_JWVfoWGbKlfEd4NjSKk&libraries=places&language=pt_BR"></script>
    
    <style>
        /* Garante que os modais comecem escondidos */
        .modal { display: none !important; }
        .modal.flex { display: flex !important; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-[#fffef0] text-slate-800 pb-20 select-none">

    <div id="autoSaveIndicator" class="fixed top-2 right-2 bg-green-500 text-white text-xs px-2 py-1 rounded shadow-lg z-50 transition-opacity opacity-0 pointer-events-none">
        💾 Salvo
    </div>

    <div id="app" class="p-4 max-w-5xl mx-auto min-h-screen"></div>

    <nav id="bottomNav" class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-md border-t border-[#d4af37] flex justify-around p-3 z-40 hidden shadow-[0_-4px_6_px_-1px_rgba(0,0,0,0.1)]">
        <button onclick="window.goTo('home')" class="flex flex-col items-center text-[#0c4a6e] active:scale-95 transition">
            <span class="text-2xl">🏠</span>
            <span class="text-[10px] font-bold uppercase tracking-wide">Início</span>
        </button>
        <button onclick="window.goTo('trip', currentState.tripId)" class="flex flex-col items-center text-[#0c4a6e] active:scale-95 transition">
            <span class="text-2xl">🗺️</span>
            <span class="text-[10px] font-bold uppercase tracking-wide">Roteiro</span>
        </button>
        <button onclick="window.openFinanceModal()" class="flex flex-col items-center text-[#0c4a6e] active:scale-95 transition">
            <span class="text-2xl">💰</span>
            <span class="text-[10px] font-bold uppercase tracking-wide">Finanças</span>
        </button>
    </nav>

    <div id="dayExtraModal" class="modal items-center justify-center z-50">
        <div class="modal-content w-full max-w-md bg-white rounded-lg shadow-2xl p-6 relative">
            <div class="flex justify-between items-center mb-4 border-b pb-2">
                <h3 class="font-magic text-2xl text-[#0c4a6e] uppercase font-bold">💰 Gasto Extra</h3>
                <button onclick="window.closeModals()" class="text-gray-400 hover:text-red-500 text-2xl font-bold px-2">&times;</button>
            </div>
            <div class="space-y-4">
                <input id="extraDesc" class="w-full p-2 border rounded" placeholder="Descrição">
                <div class="flex gap-2">
                    <input id="extraVal" type="number" class="w-full p-2 border rounded" placeholder="0.00">
                    <select id="extraCurr" class="w-24 p-2 border rounded bg-white">
                        <option value="GBP">£</option><option value="EUR">€</option>
                    </select>
                </div>
                <button onclick="window.saveDayExtra()" class="w-full bg-blue-600 text-white p-3 rounded font-bold">Salvar</button>
            </div>
        </div>
    </div>

    <div id="attractionModal" class="modal items-center justify-center z-50">
        <div class="modal-content w-full max-w-3xl max-h-[90vh] overflow-y-auto bg-white rounded-lg shadow-2xl p-6 relative">
            <div class="flex justify-between items-center mb-4 border-b pb-2 sticky top-0 bg-white z-10">
                <h3 class="font-magic text-2xl text-[#0c4a6e] uppercase font-bold">Detalhes da Atração</h3>
                <button onclick="window.closeModals()" class="text-gray-400 hover:text-red-500 text-2xl font-bold px-2">&times;</button>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input id="attName" class="p-3 border rounded border-gray-300" placeholder="Nome">
                <button onclick="window.saveAttraction()" class="bg-blue-600 text-white p-3 rounded font-bold">Salvar</button>
            </div>
        </div>
    </div>

    <div id="financeModal" class="modal items-center justify-center z-50">
        <div class="modal-content w-full max-w-2xl h-[90vh] flex flex-col bg-gray-50 p-0 overflow-hidden">
            <div class="bg-white p-4 border-b flex justify-between items-center">
                <h3 class="font-magic text-xl text-[#0c4a6e] font-bold">Painel Financeiro 💰</h3>
                <button onclick="window.closeModals()" class="text-gray-400 text-xl font-bold">&times;</button>
            </div>
            <div class="flex-1 overflow-y-auto p-4">
                <div id="tab-report" class="space-y-4">
                    <h2 id="reportGrandTotal" class="text-center text-xl font-bold text-red-600">R$ 0,00</h2>
                    <canvas id="financeChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <div id="documentsModal" class="modal items-center justify-center z-50">
        <div class="modal-content w-full max-w-lg bg-white rounded-lg shadow-2xl p-6 relative">
            <div class="flex justify-between items-center mb-4 border-b pb-2">
                <h3 class="font-magic text-2xl text-[#0c4a6e] uppercase font-bold">📂 Documentos</h3>
                <button onclick="window.closeModals()" class="text-gray-400 hover:text-red-500 text-2xl font-bold px-2">&times;</button>
            </div>
            <p class="text-sm mb-4">Em breve você poderá anexar seus vouchers de Londres e Paris!</p>
            <button onclick="window.closeModals()" class="w-full bg-blue-100 text-blue-700 py-3 rounded font-bold">Entendi</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.14.0/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <script type="module" src="js/main.js"></script>

    <script>
        window.closeModals = function() {
            const modalIds = [
                'dayExtraModal', 'attractionModal', 'transportModal', 
                'hotelModal', 'cityModal', 'radarModal', 
                'financeModal', 'documentsModal', 'checklistModal'
            ];
            modalIds.forEach(id => {
                const el = document.getElementById(id);
                if (el) el.classList.remove('flex');
            });
        };

        window.openFinanceModal = function() {
            const el = document.getElementById('financeModal');
            if (el) el.classList.add('flex');
        };

        window.openDocsModal = function() {
            const el = document.getElementById('documentsModal');
            if (el) el.classList.add('flex');
        };

        // Redireciona chamadas para o módulo principal
        window.goTo = function(a, b) { if(window.mainGoTo) window.mainGoTo(a, b); };
    </script>
<div id="hotelModal" class="modal hidden items-center justify-center z-50 fixed inset-0 bg-slate-900/70 backdrop-blur-sm">
    <div class="modal-content w-full max-w-lg bg-white rounded-lg shadow-2xl p-6 relative">
        <div class="flex justify-between items-center mb-4 border-b pb-2">
            <h3 class="font-magic text-2xl text-[#0c4a6e] uppercase font-bold">🏨 Gerenciar Hotéis</h3>
            <button onclick="window.closeModals()" class="text-gray-400 hover:text-red-500 text-2xl font-bold px-2">&times;</button>
        </div>
        <div class="space-y-3 mb-4">
            <input id="hotelName" class="w-full p-2 border rounded" placeholder="Nome do Hotel">
            <div class="grid grid-cols-2 gap-2">
                <div><label class="text-xs text-gray-500">Check-in</label><input id="hotelCheckIn" type="date" class="w-full p-2 border rounded"></div>
                <div><label class="text-xs text-gray-500">Check-out</label><input id="hotelCheckOut" type="date" class="w-full p-2 border rounded"></div>
            </div>
            <div class="grid grid-cols-3 gap-2">
                <input id="hotelCost" type="number" class="w-full p-2 border rounded" placeholder="Valor">
                <select id="hotelCur" class="w-full p-2 border rounded"><option>BRL</option><option>USD</option><option>EUR</option><option>GBP</option></select>
                <input id="hotelPayDate" type="date" class="w-full p-2 border rounded" placeholder="Data Pgto">
            </div>
            <div class="flex items-center gap-2 mt-2">
                <input id="hotelPaid" type="checkbox" class="w-5 h-5 accent-green-600">
                <label for="hotelPaid" class="text-sm font-bold text-gray-600">Já está pago?</label>
            </div>
            <button onclick="window.saveHotel()" class="w-full bg-blue-600 text-white p-2 rounded font-bold">Salvar Hotel</button>
        </div>
        <div id="hotelList" class="max-h-40 overflow-y-auto border-t pt-2 space-y-1"></div>
    </div>
</div>

</body>
</html>
