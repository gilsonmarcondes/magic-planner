<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Magic Planner ✈️</title>
    
    <meta name="theme-color" content="#fffef0">
    <link rel="apple-touch-icon" href="icon-192.png">

    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Amatic+SC:wght@700&display=swap" rel="stylesheet">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <script async src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAtp5jarrnwyy3_JWVfoWGbKlfEd4NjSKk&libraries=places&language=pt_BR"></script>
    
    <style>
        .modal { display: none !important; }
        .modal.flex, .modal:not(.hidden) { display: flex !important; opacity: 1; pointer-events: auto; }
        .hidden { display: none !important; }
        
        /* --- CORREÇÃO DO AUTOCOMPLETAR DO GOOGLE --- */
        .pac-container {
            z-index: 999999 !important;
            border-radius: 8px !important;
            border: 1px solid #0c4a6e !important;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2) !important;
            font-family: 'Quicksand', sans-serif !important;
            margin-top: 5px !important;
        }
        .pac-item {
            padding: 8px 12px !important;
            cursor: pointer !important;
            font-size: 14px !important;
        }
        .pac-item:hover {
            background-color: #f0f9ff !important;
        }
    </style>
</head>
<body class="bg-[#fffef0] text-slate-800 pb-20 select-none">

    <div id="autoSaveIndicator" class="fixed top-2 right-2 bg-green-500 text-white text-xs px-2 py-1 rounded shadow-lg z-50 transition-opacity opacity-0 pointer-events-none">
        💾 Salvo
    </div>

    <div id="app" class="p-4 max-w-5xl mx-auto min-h-screen"></div>

    <nav id="bottomNav" class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-md border-t border-[#d4af37] flex justify-around p-3 z-40 hidden shadow-[0_-4px_6_px_-1px_rgba(0,0,0,0.1)]">
        <button onclick="window.goTo('home')" class="flex flex-col items-center text-[#0c4a6e] active:scale-95 transition"><span class="text-2xl">🏠</span><span class="text-[10px] font-bold uppercase tracking-wide">Início</span></button>
        <button onclick="window.goTo('trip', currentState.tripId)" class="flex flex-col items-center text-[#0c4a6e] active:scale-95 transition"><span class="text-2xl">🗺️</span><span class="text-[10px] font-bold uppercase tracking-wide">Roteiro</span></button>
        <button onclick="window.openFinanceModal()" class="flex flex-col items-center text-[#0c4a6e] active:scale-95 transition"><span class="text-2xl">💰</span><span class="text-[10px] font-bold uppercase tracking-wide">Finanças</span></button>
    </nav>

    <div id="tripModal" class="modal hidden items-center justify-center z-50 fixed inset-0 bg-slate-900/70 backdrop-blur-sm">
        <div class="modal-content w-full max-w-md bg-white rounded-lg shadow-2xl p-6 relative">
            <div class="flex justify-between items-center mb-4 border-b pb-2">
                <h3 id="tripModalTitle" class="font-magic text-2xl text-[#0c4a6e] uppercase font-bold">Nova Viagem</h3>
                <button onclick="window.closeModals()" class="text-gray-400 hover:text-red-500 text-2xl font-bold px-2">&times;</button>
            </div>
            <div class="space-y-4">
                <input id="tripName" class="w-full p-2 border rounded border-gray-300" placeholder="Nome da Viagem (Ex: Londres 2026)">
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="text-[10px] uppercase font-bold text-gray-500">Início</label>
                        <input id="tripStart" type="date" class="w-full p-2 border rounded border-gray-300">
                    </div>
                    <div>
                        <label class="text-[10px] uppercase font-bold text-gray-500">Fim</label>
                        <input id="tripEnd" type="date" class="w-full p-2 border rounded border-gray-300">
                    </div>
                </div>
                <button onclick="window.saveTrip()" class="w-full bg-blue-600 text-white p-3 rounded font-bold shadow-lg hover:bg-blue-700 transition">Salvar Viagem</button>
            </div>
        </div>
    </div>

    <div id="attractionModal" class="modal hidden items-center justify-center z-50 fixed inset-0 bg-slate-900/70 backdrop-blur-sm">
        <div class="modal-content w-full max-w-3xl max-h-[90vh] overflow-y-auto bg-white rounded-lg shadow-2xl p-6 relative">
            <div class="flex justify-between items-center mb-4 border-b pb-2 sticky top-0 bg-white z-10">
                <h3 id="attTitle" class="font-magic text-2xl text-[#0c4a6e] uppercase font-bold">Nova Atração</h3>
                <button onclick="window.closeModals()" class="text-gray-400 hover:text-red-500 text-2xl font-bold px-2">&times;</button>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <input id="attName" class="p-2 border rounded border-gray-300" placeholder="Nome da Atração">
                <input id="attSubtitle" class="p-2 border rounded border-gray-300" placeholder="Subtítulo">
                <select id="attType" class="p-2 border rounded border-gray-300"><option value="sight">🏰 Ponto Turístico</option><option value="food">🍔 Alimentação</option><option value="shop">🛍️ Compras</option><option value="other">✨ Outro</option></select>
                <select id="attPriority" class="p-2 border rounded border-gray-300"><option value="standard">Padrão</option><option value="must_see">🌟 Imperdível</option><option value="photo">📸 Só Foto</option><option value="maybe">⏳ Se Der Tempo</option></select>
                <input id="attHours" class="p-2 border rounded border-gray-300" placeholder="Horário">
                <input id="attMapNum" type="number" class="p-2 border rounded border-gray-300" placeholder="Número Mapa">
            </div>
            <input id="attAddress" class="w-full p-2 border rounded border-gray-300 mb-4" placeholder="Endereço Completo">
            <textarea id="attPhotos" class="w-full p-2 border rounded border-gray-300 mb-4 h-20" placeholder="Links Fotos (uma por linha)"></textarea>
            <div class="mb-4">
                <button onclick="window.fetchAIFacts()" class="bg-indigo-100 text-indigo-700 text-xs px-3 py-1 rounded font-bold mb-2">✨ Gerar Dicas com IA</button>
                <div id="attDescEditor" class="h-40 bg-white rounded-b-lg border border-gray-300"></div>
            </div>
            <div class="mb-4 border p-3 rounded bg-gray-50">
                <div class="flex justify-between items-center mb-2"><label class="font-bold text-[#0c4a6e] text-sm">Custos</label><button onclick="window.addTempCost()" class="bg-green-100 text-green-700 text-xs px-2 py-1 rounded font-bold">+ Custo</button></div>
                <div id="tempCostList" class="space-y-2"></div>
            </div>
            <button onclick="window.saveAttraction()" class="w-full bg-blue-600 text-white p-3 rounded font-bold">Salvar Atração</button>
        </div>
    </div>

    <div id="transportModal" class="modal hidden items-center justify-center z-50 fixed inset-0 bg-slate-900/80 backdrop-blur-sm">
        <div class="modal-content w-full max-w-4xl max-h-[95vh] overflow-y-auto bg-white rounded-xl shadow-2xl flex flex-col md:flex-row relative">
            <button onclick="window.closeModals()" class="absolute top-4 right-4 text-gray-400 hover:text-red-500 text-3xl font-bold z-20">&times;</button>
            <div class="w-full md:w-1/2 p-6 border-r border-gray-100 flex flex-col">
                <h3 id="transTitle" class="font-magic text-2xl text-[#0c4a6e] uppercase font-bold mb-4 border-b pb-2">🎫 Bilhete</h3>
                <div class="grid grid-cols-2 gap-3 mb-4">
                    <select id="transType" class="p-2 border rounded-lg border-gray-300 bg-gray-50 text-sm font-bold"><option value="flight">✈️ Voo</option><option value="train">🚆 Comboio</option><option value="bus">🚌 Autocarro</option><option value="car">🚗 Carro</option></select>
                    <input id="transRef" class="p-2 border rounded-lg border-gray-300 text-sm font-bold uppercase" placeholder="Localizador">
                </div>
                <div class="space-y-3 mb-2 flex-1">
                    <input id="transOrigin" class="w-full p-2.5 border rounded-lg text-sm" placeholder="Origem">
                    <input id="transDepTime" type="datetime-local" class="w-full p-2 border rounded-lg text-sm">
                    <input id="transDest" class="w-full p-2.5 border rounded-lg text-sm" placeholder="Destino">
                    <input id="transArrTime" type="datetime-local" class="w-full p-2 border rounded-lg text-sm">
                </div>
                <textarea id="transNotes" class="w-full p-3 border rounded-lg text-xs h-32 bg-slate-50" placeholder="Notas..."></textarea>
                <button onclick="window.saveTransport()" class="w-full bg-blue-600 text-white p-3 rounded-lg font-bold mt-4">Guardar Bilhete</button>
            </div>
            <div class="w-full md:w-1/2 bg-gray-100 relative min-h-[300px]">
                <div id="transportMap" class="w-full h-full absolute inset-0"></div>
            </div>
        </div>
    </div>

    <div id="financeModal" class="modal hidden items-center justify-center z-50 fixed inset-0 bg-slate-900/70 backdrop-blur-sm">
        <div class="modal-content w-full max-w-2xl max-h-[90vh] overflow-y-auto bg-white rounded-lg p-6 shadow-2xl">
            <div class="flex justify-between items-center mb-6 border-b pb-2">
                <h3 class="font-magic text-2xl text-[#0c4a6e] font-bold uppercase">💰 Finanças</h3>
                <button onclick="window.closeModals()" class="text-gray-400 text-3xl font-bold hover:text-red-500">&times;</button>
            </div>
            <div id="tab-report" class="space-y-4"></div>
        </div>
    </div>

    <div id="hotelModal" class="modal hidden items-center justify-center z-50 fixed inset-0 bg-slate-900/70 backdrop-blur-sm">
        <div class="modal-content w-full max-w-lg bg-white rounded-lg shadow-2xl p-6 relative">
            <div class="flex justify-between items-center mb-4 border-b pb-2">
                <h3 class="font-magic text-2xl text-[#0c4a6e] uppercase font-bold">🏨 Hotéis</h3>
                <button onclick="window.closeModals()" class="text-gray-400 hover:text-red-500 text-2xl font-bold px-2">&times;</button>
            </div>
            <div class="space-y-3 mb-4">
                <input id="hotelName" class="w-full p-2 border rounded" placeholder="Nome">
                <div class="grid grid-cols-2 gap-2">
                    <div><label class="text-xs text-gray-500">Check-in</label><input id="hotelCheckIn" type="date" class="w-full p-2 border rounded"></div>
                    <div><label class="text-xs text-gray-500">Check-out</label><input id="hotelCheckOut" type="date" class="w-full p-2 border rounded"></div>
                </div>
                <button onclick="window.saveHotel()" class="w-full bg-blue-600 text-white p-2 rounded font-bold">Salvar Hotel</button>
            </div>
            <div id="hotelList" class="max-h-40 overflow-y-auto border-t pt-2 space-y-1"></div>
        </div>
    </div>

    <div id="dayExtraModal" class="modal hidden items-center justify-center z-50 fixed inset-0 bg-slate-900/70 backdrop-blur-sm"></div>
    <div id="checklistModal" class="modal hidden items-center justify-center z-50 fixed inset-0 bg-slate-900/70 backdrop-blur-sm"></div>
    <div id="documentsModal" class="modal hidden items-center justify-center z-50 fixed inset-0 bg-slate-900/70 backdrop-blur-sm"></div>
    <div id="citySearchModal" class="modal hidden items-center justify-center z-50 fixed inset-0 bg-slate-900/70 backdrop-blur-sm"></div>
    <div id="moveCopyModal" class="modal hidden items-center justify-center z-50 fixed inset-0 bg-slate-900/70 backdrop-blur-sm"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.14.0/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <script type="module" src="js/main.js?v=final_mesmo"></script>
</body>
</html>
