<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Planner - Viagem Abril 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-100 font-sans">

    <div class="p-10 text-center">
        <button onclick="window.openFinanceModal()" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold shadow-lg hover:bg-blue-700 transition">
            💰 Abrir Painel Financeiro
        </button>
        <button onclick="window.openDocsModal()" class="ml-4 bg-emerald-600 text-white px-6 py-2 rounded-lg font-bold shadow-lg hover:bg-emerald-700 transition">
            📄 Documentos da Viagem
        </button>
    </div>

    <div id="financeModal" class="hidden fixed inset-0 bg-slate-900/70 z-[110] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-xl w-full max-w-2xl max-h-[90vh] overflow-y-auto p-6 relative shadow-2xl">
            <button onclick="window.closeFinanceModal()" class="absolute top-4 right-4 text-gray-400 hover:text-red-500 font-bold text-2xl transition">&times;</button>
            
            <h3 class="text-2xl font-bold mb-4 text-[#0c4a6e] border-b pb-2">Painel Financeiro</h3>
            
            <div class="mb-4 bg-gray-50 p-3 rounded-lg border border-gray-200">
                <h4 class="text-xs font-bold mb-2 text-gray-500 uppercase">Cotação do Câmbio (R$)</h4>
                <div class="grid grid-cols-3 gap-3">
                    <div><label class="text-[10px] text-gray-500 font-bold">USD</label><input type="number" id="rateUSD" class="w-full border p-2 rounded text-sm" onchange="window.saveRates()"></div>
                    <div><label class="text-[10px] text-gray-500 font-bold">EUR</label><input type="number" id="rateEUR" class="w-full border p-2 rounded text-sm" onchange="window.saveRates()"></div>
                    <div><label class="text-[10px] text-gray-500 font-bold">GBP</label><input type="number" id="rateGBP" class="w-full border p-2 rounded text-sm" onchange="window.saveRates()"></div>
                </div>
            </div>

            <div class="flex border-b mb-4">
                <button id="btn-tab-report" onclick="window.switchFinanceTab('report')" class="flex-1 py-2 font-bold text-sm border-b-2 border-blue-600 text-blue-600">Visão Geral</button>
                <button id="btn-tab-monthly" onclick="window.switchFinanceTab('monthly')" class="flex-1 py-2 font-bold text-sm border-b-2 border-transparent text-gray-500">Por Mês</button>
                <button id="btn-tab-costs" onclick="window.switchFinanceTab('costs')" class="flex-1 py-2 font-bold text-sm border-b-2 border-transparent text-gray-500">Custos Iniciais</button>
            </div>

            <div id="tab-report">
                <h2 id="reportGrandTotal" class="text-center text-xl font-bold text-red-600 mb-4 bg-red-50 p-2 rounded-lg border border-red-100">R$ 0,00</h2>
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div>
                        <h4 class="text-[10px] font-bold text-gray-500 uppercase mb-1">Pagos</h4>
                        <div id="reportSunkCosts" class="grid grid-cols-2 gap-1 text-xs text-emerald-700"></div>
                    </div>
                    <div>
                        <h4 class="text-[10px] font-bold text-gray-500 uppercase mb-1">A Pagar</h4>
                        <div id="reportVariableCosts" class="grid grid-cols-2 gap-1 text-xs text-amber-700"></div>
                    </div>
                </div>
                <div class="w-full h-48 mb-6">
                    <canvas id="financeChart"></canvas>
                </div>
            </div>

            <div id="tab-costs" class="hidden">
                <div class="bg-blue-50 p-3 rounded-lg border border-blue-100 mb-4">
                    <div class="grid grid-cols-2 gap-2 mb-2">
                        <input type="text" id="initType" class="border p-2 rounded text-sm" placeholder="Ex: Voo, Seguro..." list="costTypes">
                        <input type="text" id="initDesc" class="border p-2 rounded text-sm" placeholder="Descrição">
                    </div>
                    <div class="grid grid-cols-3 gap-2 mb-2">
                        <input type="number" id="initVal" class="border p-2 rounded text-sm" placeholder="Valor">
                        <select id="initCurr" class="border p-2 rounded text-sm"><option>BRL</option><option>EUR</option><option>GBP</option></select>
                        <input type="date" id="initDate" class="border p-2 rounded text-sm">
                    </div>
                    <button onclick="window.addInitialCost()" class="w-full bg-[#0c4a6e] text-white p-2 rounded font-bold shadow hover:bg-[#072c42]">➕ Adicionar Custo</button>
                </div>
                <ul id="initialCostsList" class="space-y-2 max-h-40 overflow-y-auto"></ul>
            </div>
        </div>
    </div>

    <div id="docsModal" class="hidden fixed inset-0 bg-slate-900/70 z-[120] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-xl w-full max-w-md p-8 relative text-center shadow-2xl">
            <button onclick="window.closeDocsModal()" class="absolute top-4 right-4 text-gray-400 hover:text-red-500 text-2xl">&times;</button>
            <div class="mb-4 text-slate-300">
                <svg class="w-16 h-16 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
            </div>
            <h3 class="text-xl font-bold text-[#0c4a6e] mb-2">DOCUMENTOS DA VIAGEM</h3>
            <p class="text-sm text-gray-600 mb-6">A galeria de documentos (vouchers e PDFs) está sendo adaptada para salvar diretamente no banco de dados. Em breve!</p>
            <button onclick="window.closeDocsModal()" class="w-full bg-blue-100 text-blue-700 py-3 rounded-lg font-bold hover:bg-blue-200 transition">Entendi</button>
        </div>
    </div>

    <script type="module" src="./js/finance.js"></script>
</body>
</html>
